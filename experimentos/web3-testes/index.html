<!DOCTYPE html> <!-- Instrução obrigatória na primeira linha de um documento HTML5 que informa ao navegador qual versão do HTML está sendo usada -->
<html lang="pt-br"> <!-- Linguagem que o browser irá interpretar -->
<head> <!-- Elemento que representa uma cadeia de metadados do documento -->
    <meta charset="UTF-8"> <!-- define a codificação de símbolos, letras e números em documentos digitais -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Instrui o navegador a ajustar a largura da página à largura da tela do aparelho -->
    <title>Experimentos com HTML, CSS, Javascript</title> <!-- Título do documento -->
    <link rel="stylesheet" href="style.css">
</head>
<body> <!-- Corpo do documento -->

    <input type="number" id="primeiro" placeholder="Insira o primeiro número">
    <input type="number" id="segundo" placeholder="Insira o segundo número">
    <button onclick="soma()">Somar</button>

    <script src="script.js"></script>
</body>
</html>
